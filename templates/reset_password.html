<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>

<body class="login-page">

<div class="login-box">

    <h1>CV Parser</h1>

    <p>Đặt lại mật khẩu</p>

    <form action="/reset-password" method="POST">

        <label>Mật khẩu mới</label>

        <input
            type="password"
            name="password"
            placeholder="Nhập mật khẩu mới"
            required>

        <label>Nhập lại mật khẩu</label>

        <input
            type="password"
            name="confirm_password"
            placeholder="Nhập lại mật khẩu"
            required>

        <button type="submit">
            Đổi mật khẩu
        </button>

        <a href="/login" class="back-login-btn">
            Quay lại đăng nhập
        </a>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

    </form>

</div>

</body>

</html>
