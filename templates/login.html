<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CV Parser Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>

<body class="login-page">

    <div class="login-box">

        <h1>CV Parser</h1>
        <p>Đăng nhập hệ thống</p>

        <form action="/login" method="POST">

            <label>Email</label>

            <input
                type="email"
                name="email"
                placeholder="Nhập email"
                required>

            <label>Mật khẩu</label>

            <input
                type="password"
                name="password"
                placeholder="Nhập mật khẩu"
                required>

            <button type="submit">
                Đăng nhập
            </button>

            {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
            {% endif %}

        </form>

    </div>

</body>

</html>
